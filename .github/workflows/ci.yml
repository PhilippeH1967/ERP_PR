name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — ruff + pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: change-me
          POSTGRES_DB: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: change-me
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: erp_test
      SECRET_KEY: ci-not-a-real-secret

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/local.txt

      - name: Installer les dépendances
        run: pip install -r requirements/local.txt

      # Gate bloquant : règles à forte valeur (bugs, sécurité, modernisation,
      # tri d'imports). Doit rester vert — empêche toute NOUVELLE régression.
      - name: Ruff — gate bloquant
        run: ruff check . --select F,B,S,UP,I

      # Rapport complet (E501 longueur de ligne, N nommage…) : dette de style
      # legacy, affichée pour suivi mais NON bloquante tant qu'on la résorbe.
      - name: Ruff — rapport complet (non bloquant)
        continue-on-error: true
        run: ruff check .

      - name: Pytest
        run: pytest -q

  frontend:
    name: Frontend — type-check + lint + vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Type-check (vue-tsc)
        run: npm run type-check

      - name: Lint (eslint)
        run: npm run lint

      - name: Tests unitaires (Vitest)
        run: npm run test:unit
