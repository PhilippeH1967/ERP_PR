upstream django_backend {
    server django:8000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name srv1248490.hstgr.cloud;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name srv1248490.hstgr.cloud;

    ssl_certificate /etc/letsencrypt/live/srv1248490.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1248490.hstgr.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # API + Admin Django
    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django static files (collectstatic)
    location /static/ {
        alias /var/www/django-static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Media uploads
    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    # Frontend (Vue SPA)
    location / {
        proxy_pass http://vue:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
